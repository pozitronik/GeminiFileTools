; Gemini WLX Plugin Configuration
; Place this file next to gemini.wlx / gemini.wlx64
; All values shown below are defaults -- uncomment and change as needed.

[General]

; Hide empty display blocks (chunks with no text and no embedded resource).
; 0 = show all blocks, 1 = hide empty blocks (default)
;HideEmptyBlocks=1

; Combine consecutive blocks of the same kind into a single visual block.
; 0 = separate blocks (default), 1 = combined
;CombineBlocks=0

; Render Markdown formatting in model output as HTML.
; Supports: headings (# through ######), bold (**), italic (*),
; bold-italic (***), inline code (`), strikethrough (~~), fenced code blocks (```).
; 0 = plain text (raw Markdown markers visible), 1 = rendered (default)
;RenderMarkdown=1

[HtmlDefaults]

; Start the HTML page in full-width mode (no max-width column).
; The user can still toggle width via the floating controls panel.
; 0 = column width (default), 1 = full width
;DefaultFullWidth=0

; Thinking block visibility at page load.
; This value is persisted automatically when you cycle the thinking
; button in the floating controls panel (Collapse -> Hide -> Expand).
; 0 = collapsed (default), 1 = expanded, 2 = hidden
;DefaultExpandThinking=0

; Wrap system instruction in a collapsible block (collapsed by default).
; 0 = always visible, 1 = collapsible (default)
;CollapseSystemInstruction=1

[WebView2]

; User data folder for WebView2 browser profile.
; Empty = %TEMP%\gemini_wlx (default)
;UserDataFolder=

; Allow right-click context menu in the viewer.
; Provides "Save image as..." and "Copy image" on embedded images.
; 0 = disabled, 1 = enabled (default)
;AllowContextMenu=1

; Allow opening DevTools (F12) in the viewer.
; 0 = disabled (default), 1 = enabled
;AllowDevTools=0

[Thumbnails]

; Fallback thumbnail for files without embedded images.
; text     = first user message excerpt as text card (default)
; stripe   = colored bars showing conversation structure
; metadata = model name, chunk count, token count
; none     = no thumbnail for imageless files
;Fallback=text
