; Gemini WCX Plugin Configuration
; Place this file next to gemini.wcx / gemini.wcx64
; All values shown below are defaults -- uncomment and change as needed.

[General]

; Use the original file name for virtual conversation files.
; 0 = conversation.txt / conversation.md / conversation.html (default)
; 1 = <original_name>.txt / <original_name>.md / <original_name>.html
;UseOriginalName=0

[Formatters]

; Hide empty display blocks (chunks with no text and no embedded resource).
; When hidden, remote attachment counts are shown as hints on the next
; non-empty block instead. Applies per formatter independently.
; 0 = show all blocks, 1 = hide empty blocks (default)
;HideEmptyBlocksText=1
;HideEmptyBlocksMd=1
;HideEmptyBlocksHtml=1

; Combine consecutive blocks of the same kind into a single visual block.
; Applies per formatter independently. 0 = separate blocks (default), 1 = combined.
;CombineBlocksText=0
;CombineBlocksMd=0
;CombineBlocksHtml=0

[HtmlDefaults]

; Start the HTML page in full-width mode (no max-width column).
; The user can still toggle width via the floating controls panel.
; 0 = column width (default), 1 = full width
;DefaultFullWidth=0

; Start thinking blocks expanded instead of collapsed.
; The user can still expand/collapse via the floating controls panel.
; 0 = collapsed (default), 1 = expanded
;DefaultExpandThinking=0

; Render Markdown formatting in model output as HTML.
; Supports: bold (**), italic (*), bold-italic (***), inline code (`),
; strikethrough (~~), fenced code blocks (```).
; 0 = plain text (raw Markdown markers visible), 1 = rendered (default)
;RenderMarkdown=1
